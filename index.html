<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hours Tracker">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Work Hours Tracker</title>

<style>
body
{
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 20px;
    background: #01101f;
    color: white;
}

.container
{
    max-width: 400px;
    margin: auto;
    background-color: #02182d;
    padding: 30px;
    border-radius: 20px;
}

h1
{
    margin-bottom: 30px;
}

.hours
{
    margin-top: 30px;
    font-size: 100px;
    font-weight: bold;
    margin-bottom: 20px;
    color: #ffffff;
}

.status
{
    font-size: 24px;
    margin-top: 30px;
    padding: 20px;
    margin-bottom: 30px;
    border-radius: 10px;
    background-color: #01101f;
    color: #737373;
}

button
{
    padding: 20px;
    font-size: 24px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#shiftButton
{
    background: #8bfe8f;
    color: white;
}

#breakButton
{
    background: #2196F3;
    color: white;
}

#lunchButton
{
    background: #FF9800;
    color: white;
}

#shiftButton
{
    width: 100%;
    background: #4CAF50;
    color: white;
    margin-bottom: 15px;
}

.buttonRow
{
    display: flex;
    gap: 10px;
}

#breakButton,
#lunchButton
{
    flex: 1;
    background: #2196F3;
    color: white;
}

#historyContainer
{
    margin: auto;
    margin-top: 30px;
    max-width: 400px;

    background-color: #02182d;
    padding: 30px;
    border-radius: 20px;
}

#historyContainer h3
{
    margin-bottom: 10px;
    color: #737373;
}

.historyItem
{
    display: flex;
    justify-content: space-between;
    padding: 12px;
    align-items: center;
    margin-bottom: 10px;
    background-color: #01101f;
    border-radius: 8px;
    color: white;
    font-size: 18px;
}

.deleteBtn
{
    background: #f44336;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
}

</style>
</head>

<body>

<div class="container">

<h1>Time Tracker</h1>

<div id="hoursText" class="hours">
0.0
</div>

<div id="statusText" class="status">
Not Working
</div>

<button id="shiftButton">
Start Shift
</button>

<div class="buttonRow">

    <button id="breakButton">
    Break
    </button>

    <button id="lunchButton">
    Lunch
    </button>

</div>

</div>
<div id="historyContainer">
    <h3>Shift History</h3>
    <div id="historyList"></div>
</div>

<script>

let history =
    JSON.parse(
        localStorage.getItem("history")
    ) || [];

const State =
{
    OffDuty: 0,
    Working: 1,
    Break: 2,
    Lunch: 3
};

let data =
{
    shiftActive: false,
    shiftStart: null,

    state: State.OffDuty,

    pauseStart: null,
    pauseEnd: null,

    unpaidLunchSeconds: 0
};

function save()
{
    localStorage.setItem(
        "workTracker",
        JSON.stringify(data)
    );
}

function load()
{
    const saved =
        localStorage.getItem("workTracker");

    if(saved)
    {
        data = JSON.parse(saved);
    }
}

function formatTime(date)
{
    return date.toLocaleTimeString(
        [],
        {
            hour: 'numeric',
            minute: '2-digit'
        }
    );
}

function startShift()
{
    data.shiftActive = true;

    data.shiftStart =
        new Date().toISOString();

    data.unpaidLunchSeconds = 0;

    data.state = State.Working;

    save();
}

function endShift()
{
    data.shiftActive = false;
    data.state = State.OffDuty;

    const now = new Date();

    const start =
        new Date(data.shiftStart);

    let workedSeconds =
        (now - start) / 1000;

    workedSeconds -= data.unpaidLunchSeconds;

    const hours =
        (workedSeconds / 3600).toFixed(1);

    // format date
    const date =
        now.toLocaleDateString();

    history.unshift(
    {
        date: date,
        hours: hours
    });

    // save history
    localStorage.setItem(
        "history",
        JSON.stringify(history)
    );

    save();
    renderHistory();
}

function startBreak()
{
    if(!data.shiftActive)
        return;

    if(data.state !== State.Working)
        return;

    const now = new Date();

    data.pauseStart =
        now.toISOString();

    data.pauseEnd =
        new Date(
            now.getTime() + 15 * 60 * 1000
        ).toISOString();

    data.state = State.Break;

    save();
}

function startLunch()
{
    if(!data.shiftActive)
        return;

    if(data.state !== State.Working)
        return;

    const now = new Date();

    data.pauseStart =
        now.toISOString();

    data.pauseEnd =
        new Date(
            now.getTime() + 30 * 60 * 1000
        ).toISOString();

    data.state = State.Lunch;

    save();
}

function updateUI()
{
    const hoursText =
        document.getElementById("hoursText");

    const statusText =
        document.getElementById("statusText");

    const shiftButton =
        document.getElementById("shiftButton");

    if(!data.shiftActive)
    {
        hoursText.innerText = "0.0";
        statusText.innerText = "Not Working";
        shiftButton.innerText = "Start Shift";
        shiftButton.style.background = "#4CAF50";
        return;
    }

    shiftButton.innerText = "End Shift";
    shiftButton.style.background = "#f44336";

    const now = new Date();

    if(
        data.state === State.Break ||
        data.state === State.Lunch
    )
    {
        const end =
            new Date(data.pauseEnd);

        if(now >= end)
        {
            if(data.state === State.Lunch)
            {
                const start =
                    new Date(data.pauseStart);

                data.unpaidLunchSeconds +=
                    (end - start) / 1000;
            }

            data.state = State.Working;

            save();
        }
    }

    if(data.state === State.Break)
    {
        statusText.innerText =
            "On Break\nEnds " +
            formatTime(
                new Date(data.pauseEnd)
            );
    }
    else if(data.state === State.Lunch)
    {
        statusText.innerText =
            "On Lunch\nEnds " +
            formatTime(
                new Date(data.pauseEnd)
            );
    }
    else
    {
        statusText.innerText =
            "Currently Working";
    }

    let workedSeconds =
        (now -
        new Date(data.shiftStart))
        / 1000;

    workedSeconds -=
        data.unpaidLunchSeconds;

    if(data.state === State.Lunch)
    {
        workedSeconds -=
        (
            now -
            new Date(data.pauseStart)
        ) / 1000;
    }

    workedSeconds =
        Math.max(
            0,
            workedSeconds
        );

    const hours =
        workedSeconds / 3600;

    hoursText.innerText =
        hours.toFixed(1);
}

function renderHistory()
{
    const list =
        document.getElementById("historyList");

    list.innerHTML = "";

    for(let i = 0; i < history.length; i++)
    {
        const item =
            document.createElement("div");

        item.className = "historyItem";

        const left =
            document.createElement("span");

        left.innerText =
            history[i].date;

        const right =
            document.createElement("div");

        right.style.display = "flex";
        right.style.gap = "10px";
        right.style.alignItems = "center";

        const hours =
            document.createElement("span");

        hours.innerText =
            history[i].hours + " hrs";

        const del =
            document.createElement("button");

        del.innerText = "X";
        del.className = "deleteBtn";

        del.onclick = function()
        {
            deleteHistoryItem(i);
        };

        right.appendChild(hours);
        right.appendChild(del);

        item.appendChild(left);
        item.appendChild(right);

        list.appendChild(item);
    }
}

function deleteHistoryItem(index)
{
    history.splice(index, 1);

    localStorage.setItem(
        "history",
        JSON.stringify(history)
    );

    renderHistory();
}

document
.getElementById("shiftButton")
.addEventListener(
    "click",
    () =>
    {
        if(data.shiftActive)
        {
            endShift();
        }
        else
        {
            startShift();
        }
    }
);

document
.getElementById("breakButton")
.addEventListener(
    "click",
    startBreak
);

document
.getElementById("lunchButton")
.addEventListener(
    "click",
    startLunch
);

load();

renderHistory();

updateUI();

setInterval(
    updateUI,
    1000
);

</script>

</body>
</html>
